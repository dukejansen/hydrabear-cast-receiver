<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- =============================================================================
  HydraBear custom Cast receiver (styled web receiver, CAF v3).

  WHY: Google's Default Media Receiver hard-caps its controls (no next/prev/up-next
  even with a queue) and botches seek-on-load (unreliable resume). A custom receiver
  we own fixes both AND lets us brand it like HB's Now Playing card.

  DEPLOY (one-time):
    1. Host this file at a PUBLIC HTTPS URL, e.g. https://<your-domain>/cast/receiver.html
       (an S3 static-site bucket works -- just upload it).
    2. Google Cast Developer Console (https://cast.google.com/publish) -> $5 one-time
       registration -> "Add new application" -> Custom Receiver -> paste the HTTPS URL
       -> get an Application ID.
    3. Register your home Cast devices (serial numbers) under "Cast Receiver Devices"
       so they can load an unpublished receiver (no Google review needed for your own devices).
    4. Set the Application ID in HydraBear config: cast.receiver.appid=<APP_ID>
       (when set, HB launches THIS receiver + QUEUE_LOAD; else falls back to the default receiver).

  The sender uses a STANDARD QUEUE_LOAD (no proprietary customData) -- this receiver just
  styles it, enables the rich commands, and handles resume itself. Eventually this can host
  Plex casts too (one HB-branded receiver for everything).
============================================================================= -->
<title>HydraBear</title>
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #0f1115; color: #e6e6e6;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  /* HB dark theme for the built-in player UI (cover + title + subtitle + progress + controls). */
  cast-media-player {
    --background-color: #0f1115;
    --splash-image: none;
    --theme-hue: 210;
    --progress-color: #2b6cb0;
    --logo-color: #8ab4d8;
    --title-color: #e6e6e6;
    --subtitle-color: #9fb0c4;
    --buffering-color: #2b6cb0;
  }
</style>
</head>
<body>
  <cast-media-player></cast-media-player>
  <script>
    // ---- PUBLIC display name: change this (and <title> above) when the name is finalized. ----
    const NAME = "HydraBear";

    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();
    const Cmd = cast.framework.messages.Command;

    // Rich on-screen controls (next/prev/seek) -- the whole reason for a custom receiver.
    pm.setSupportedMediaCommands(
      Cmd.ALL_BASIC_MEDIA | Cmd.QUEUE_NEXT | Cmd.QUEUE_PREV | Cmd.SEEK, true);

    // Reliable RESUME: the default receiver mishandles a currentTime in the LOAD (esp. chaptered m4b).
    // Here we take the position (customData.startPosition, or the request's currentTime) and seek
    // AFTER the media is ready -- no fragile sender-side post-load-seek.
    let resumeTo = 0;
    pm.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (req) => {
      const cd = (req.media && req.media.customData) || {};
      resumeTo = Number(cd.startPosition || req.currentTime || 0) || 0;
      req.currentTime = 0; // don't let the load itself seek; we do it on load-complete
      return req;
    });
    pm.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
      if (resumeTo > 1) { try { pm.seek(resumeTo); } catch (e) {} resumeTo = 0; }
    });

    // FUTURE: render a fully custom Now-Playing card here from pm.getMediaInformation()
    // (cover, book title, author, "Chapter N of M", progress) to match HB's UI exactly,
    // and show the up-next queue. For now the styled built-in player + rich commands is the v1 receiver.

    ctx.start(new cast.framework.CastReceiverOptions());
  </script>
</body>
</html>
