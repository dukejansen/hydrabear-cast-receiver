<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- =============================================================================
  HydraBear custom Cast receiver (styled web receiver, CAF v3).

  WHY: Google's Default Media Receiver hard-caps its controls (no next/prev/up-next
  even with a queue) and botches seek-on-load (unreliable resume). Our own receiver
  fixes both AND brands it in HydraBear's colors.

  PHASE 1 (this file): HB green palette + logo, real controls (next/prev/seek), the
  built-in player's up-next/queue for a queued book, and reliable resume.
  PHASE 2 (later): a fully-custom Now-Playing CARD layout (our exact fonts/spacing +
  "Chapter N of M" + a styled up-next list) rendered from the media status.

  DEPLOY: host receiver.html AND icon.svg (same folder) at a PUBLIC HTTPS URL, register
  a Custom Receiver in the Cast console (points at receiver.html), register your home
  devices, then set cast.receiver.appid in HydraBear config. Sender sends a standard
  QUEUE_LOAD (no proprietary customData); media URLs carry their own token.
============================================================================= -->
<title>HydraBear</title>
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<!-- TEMP: on-screen debug overlay so we can see load/playback errors ON the display. Remove once casting works. -->
<script src="https://www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
<style>
  /* HydraBear palette (from web/index.html): bg #0f1115, surfaces #171a21/#121620,
     text #e6e6e6, GREEN accents #5a9 / #7fe08a, muted #9fb0c4. */
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(circle at 50% 38%, #16202b 0%, #0f1115 70%);
    color: #e6e6e6;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  cast-media-player {
    --background-color: #0f1115;
    --theme-hue: 150;                 /* green, matching HB's #5a9 accent */
    --progress-color: #5aa987;        /* HB green progress fill (#5a9) */
    --title-color: #e6e6e6;
    --subtitle-color: #9fb0c4;
    --logo-color: #7fe08a;            /* HB bright green */
    --buffering-color: #7fe08a;
    --splash-image: url("icon.svg");  /* HB hub mark on the idle/splash screen */
    --logo-image: url("icon.svg");    /* small HB watermark during playback */
  }
</style>
</head>
<body>
  <cast-media-player></cast-media-player>
  <script>
    // ---- PUBLIC display name: change this (and <title> above) when the name is finalized. ----
    const NAME = "HydraBear";

    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();
    const Cmd = cast.framework.messages.Command;

    // TEMP debug overlay -- prints LOAD requests + errors on the display so we can diagnose "launches but won't play".
    try {
      const dbg = cast.debug.CastDebugLogger.getInstance();
      dbg.setEnabled(true);
      dbg.showDebugLogs(true);
      pm.addEventListener(cast.framework.events.EventType.ERROR, (e) => {
        try { dbg.info("HB", "PLAYER ERROR: " + JSON.stringify(e)); } catch (x) {}
      });
    } catch (e) {}

    // Rich on-screen controls (next/prev/seek) -- the whole reason for a custom receiver.
    pm.setSupportedMediaCommands(
      Cmd.ALL_BASIC_MEDIA | Cmd.QUEUE_NEXT | Cmd.QUEUE_PREV | Cmd.SEEK, true);

    // Reliable RESUME: the default receiver mishandles a currentTime in the LOAD (esp. chaptered m4b).
    // Take the position (customData.startPosition, else the request's currentTime) and seek AFTER the
    // media is ready -- no fragile sender-side post-load-seek.
    let resumeTo = 0;
    pm.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (req) => {
      const cd = (req.media && req.media.customData) || {};
      resumeTo = Number(cd.startPosition || req.currentTime || 0) || 0;
      req.currentTime = 0; // don't let the load itself seek; we do it on load-complete
      return req;
    });
    pm.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
      if (resumeTo > 1) { try { pm.seek(resumeTo); } catch (e) {} resumeTo = 0; }
    });

    // PHASE 2 hook: render a fully-custom HB Now-Playing card here (cover, title, author,
    // "Chapter N of M", styled up-next) from pm.getMediaInformation() + pm.getQueueManager().

    ctx.start(new cast.framework.CastReceiverOptions());
  </script>
</body>
</html>
