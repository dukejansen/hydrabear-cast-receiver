<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- =============================================================================
  HydraBear custom Cast receiver -- DEV / App B (fully-custom Now-Playing card).

  Built-in <cast-media-player> is demoted to a hidden audio engine; we render our own
  full-screen card over it. Data is queue-only (QueueManager + PlayerData); no server.

  v5: real SVG control icons (no emoji/glyph fonts -- they render as tofu on the device),
  bigger type, book title + author + "Part N of M", Up Next from the QueueManager.
  Icons are inline SVG so they render identically on every surface (the same reason the
  HB app should move off emoji icons). prev/next FUNCTION is best-effort (see jump()).

  DEPLOY: upload + Pages build (green check) + POWER-CYCLE the device (or bump the URL
  with ?v=N in the console) to bust caches. Version badge (top-right) confirms the build.
============================================================================= -->
<title>HydraBear</title>
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #0f1115; color: #e6e6e6;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  cast-media-player { position: fixed; inset: 0; z-index: 0; }

  #card { position: fixed; inset: 0; z-index: 2147483000;
    background: radial-gradient(circle at 50% 32%, #16241f 0%, #0f1512 72%);
    display: flex; flex-direction: column; box-sizing: border-box; padding: 0 5vw; }

  #bar { display: flex; align-items: center; gap: 14px; padding: 3vh 0 1vh;
    font: 800 3.4vh system-ui; color: #7fe08a; letter-spacing: .01em; }
  #bar img { width: 4.6vh; height: 4.6vh; }
  #bar #ver { margin-left: auto; font: 600 1.5vh system-ui; color: #5aa987; opacity: .7; }

  #main { flex: 1 1 auto; display: flex; align-items: center; gap: 4.5vw; min-height: 0; }
  #cover { height: 52vh; aspect-ratio: 1/1; object-fit: cover; border-radius: 16px;
    background: #0b0d11; box-shadow: 0 14px 44px rgba(0,0,0,.6); flex: 0 0 auto; }
  #meta { min-width: 0; flex: 1 1 auto; }
  #title { font: 800 5.2vh system-ui; line-height: 1.08; margin-bottom: 1.8vh;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  #author { font: 500 3.4vh system-ui; color: #cfe; margin-bottom: 2.2vh; }
  #chapter { display: inline-block; font: 700 2.4vh system-ui; color: #0b120d; background: #7fe08a;
    padding: .5vh 1.6vh; border-radius: 999px; letter-spacing: .04em; }

  #prog { height: 8px; background: #26332c; border-radius: 5px; overflow: hidden; margin: 1.6vh 0 .8vh; }
  #fill { height: 100%; width: 0; background: linear-gradient(90deg, #2c8f59, #5fe0a0); }
  #times { display: flex; justify-content: space-between; font: 600 2.1vh system-ui; color: #9fb0c4; }

  #ctrls { display: flex; align-items: center; justify-content: center; gap: 3vw; padding: 2.4vh 0 1.2vh; }
  #ctrls button { border: 0; cursor: pointer; color: #e6e6e6; background: #1c2330; border: 1px solid #2a3a4a;
    border-radius: 50%; width: 9vh; height: 9vh; display: flex; align-items: center; justify-content: center; }
  #ctrls button svg { width: 4.4vh; height: 4.4vh; fill: currentColor; }
  #ctrls .seek { font: 800 2.4vh system-ui; color: #cde; }
  #ctrls #pp { width: 11vh; height: 11vh; background: #2c8f59; border-color: #5fe0a0; color: #06120b; }
  #ctrls #pp svg { width: 5.4vh; height: 5.4vh; }

  #upnext { display: none; align-items: center; gap: 16px; padding: 1.8vh 0 3vh; }
  #upnext .lbl { color: #7fe08a; font: 800 1.7vh system-ui; letter-spacing: .16em; text-transform: uppercase; }
  #upnext img { width: 6vh; height: 6vh; border-radius: 8px; object-fit: cover; background: #0b0d11; }
  #upnext #ntitle { font: 600 2.6vh system-ui; color: #e6e6e6; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
</style>
</head>
<body>
  <cast-media-player></cast-media-player>
  <div id="card">
    <div id="bar"><img src="icon.svg" alt=""><span>HydraBear</span><span id="ver">v5-dev</span></div>
    <div id="main">
      <img id="cover" alt="">
      <div id="meta">
        <div id="title">Ready</div>
        <div id="author"></div>
        <div id="chapter" style="display:none"></div>
      </div>
    </div>
    <div id="prog"><div id="fill"></div></div>
    <div id="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    <div id="ctrls">
      <button id="prev" title="Previous"><svg viewBox="0 0 24 24"><path d="M7 6h2.2v12H7zM20 6v12L9.5 12z"/></svg></button>
      <button id="back" class="seek" title="Back 30s">&minus;30</button>
      <button id="pp" title="Play/Pause"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button id="fwd" class="seek" title="Forward 30s">+30</button>
      <button id="next" title="Next"><svg viewBox="0 0 24 24"><path d="M14.8 6H17v12h-2.2zM4 6l10.5 6L4 18z"/></svg></button>
    </div>
    <div id="upnext"><span class="lbl">Up Next</span><img id="nimg" alt=""><span id="ntitle"></span></div>
  </div>
  <script>
    const NAME = "HydraBear";
    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();
    const Cmd = cast.framework.messages.Command;
    const $ = (id) => document.getElementById(id);
    const ICON_PLAY = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    const ICON_PAUSE = '<svg viewBox="0 0 24 24"><path d="M6.5 5h4v14h-4zM13.5 5h4v14h-4z"/></svg>';

    pm.setSupportedMediaCommands(
      Cmd.ALL_BASIC_MEDIA | Cmd.QUEUE_NEXT | Cmd.QUEUE_PREV | Cmd.SEEK, true);

    // Reliable resume (seek after media is ready).
    let resumeTo = 0;
    pm.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (req) => {
      const cd = (req.media && req.media.customData) || {};
      resumeTo = Number(cd.startPosition || req.currentTime || 0) || 0;
      req.currentTime = 0;
      return req;
    });
    pm.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
      if (resumeTo > 1) { try { pm.seek(resumeTo); } catch (e) {} resumeTo = 0; }
    });

    const fmt = (s) => {
      s = Math.max(0, Math.floor(s || 0));
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), x = s % 60;
      return (h ? h + ":" + String(m).padStart(2, "0") : m) + ":" + String(x).padStart(2, "0");
    };
    const mdOf = (item) => (item && item.media && item.media.metadata) || {};
    const imgOf = (md) => (md.images && md.images[0] && md.images[0].url) || "";

    // Static metadata (title / author / cover / part / up-next) from the QUEUE.
    function refreshMeta() {
      try {
        const qm = pm.getQueueManager && pm.getQueueManager();
        if (!qm) return;
        const items = qm.getItems() || [];
        const idx = qm.getCurrentItemIndex();
        const cur = mdOf(items[idx]);
        $("title").textContent = cur.albumName || cur.title || "Playing";
        $("author").textContent = cur.artist || cur.albumArtist || "";
        const cimg = imgOf(cur); if (cimg) $("cover").src = cimg;
        if (idx >= 0 && items.length > 0) { $("chapter").style.display = "inline-block"; $("chapter").textContent = "Part " + (idx + 1) + " of " + items.length; }
        const nx = items[idx + 1];
        if (nx) { const nmd = mdOf(nx); $("ntitle").textContent = nmd.title || nmd.albumName || "Next part"; $("nimg").src = imgOf(nmd) || "icon.svg"; $("upnext").style.display = "flex"; }
        else { $("upnext").style.display = "none"; }
      } catch (e) {}
    }

    // Live position + play/pause state from PlayerData.
    try {
      const pd = new cast.framework.ui.PlayerData();
      const binder = new cast.framework.ui.PlayerDataBinder(pd);
      binder.addEventListener(cast.framework.ui.PlayerDataEventType.ANY_CHANGE, () => {
        try {
          const c = pd.currentTime || 0, d = pd.duration || 0;
          $("cur").textContent = fmt(c); $("dur").textContent = fmt(d);
          $("fill").style.width = d > 0 ? Math.min(100, (c / d) * 100) + "%" : "0";
          const paused = pd.state === cast.framework.ui.State.PAUSED;
          $("pp").innerHTML = paused ? ICON_PLAY : ICON_PAUSE;
          refreshMeta();
        } catch (e) {}
      });
    } catch (e) {}
    pm.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, refreshMeta);

    // Controls.
    const curTime = () => { try { return pm.getCurrentTimeSec(); } catch (e) { return 0; } };
    $("pp").onclick = () => { try { (pm.getPlayerState() === cast.framework.messages.PlayerState.PAUSED) ? pm.play() : pm.pause(); } catch (e) {} };
    $("back").onclick = () => { try { pm.seek(Math.max(0, curTime() - 30)); } catch (e) {} };
    $("fwd").onclick = () => { try { pm.seek(curTime() + 30); } catch (e) {} };
    // Queue jump -- best-effort: jump to the target item by id via a QUEUE_UPDATE request.
    const jump = (n) => {
      try {
        const qm = pm.getQueueManager();
        const items = qm.getItems() || [];
        const target = items[qm.getCurrentItemIndex() + n];
        if (!target) return;
        const req = new cast.framework.messages.QueueUpdateRequestData();
        req.currentItemId = target.itemId;
        (pm.sendLocalMediaRequest || pm.load).call(pm, req);
      } catch (e) {}
    };
    $("prev").onclick = () => jump(-1);
    $("next").onclick = () => jump(1);

    ctx.start(new cast.framework.CastReceiverOptions());
  </script>
</body>
</html>
