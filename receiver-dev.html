<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- =============================================================================
  HydraBear custom Cast receiver -- DEV / App B (fully-custom Now-Playing card).

  Built-in <cast-media-player> is a hidden audio engine; we render our own full-screen
  card over it. Queue-only data (QueueManager + PlayerData); no server.

  v6: Up Next moved into the TOP BAR (logo+name left, Up Next right) -- no bottom strip,
  no rotation, no control overlay (always-visible controls, by design). Adds a NOW
  PLAYING eyebrow + author line. SVG control icons (no emoji/glyph fonts).

  DEPLOY: upload + Pages build (green check) + POWER-CYCLE the device to bust caches.
  Version badge (bottom-right) confirms the build.
============================================================================= -->
<title>HydraBear</title>
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #0f1115; color: #e6e6e6;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  cast-media-player { position: fixed; inset: 0; z-index: 0; }

  #card { position: fixed; inset: 0; z-index: 2147483000;
    background: radial-gradient(circle at 50% 32%, #16241f 0%, #0f1512 72%);
    display: flex; flex-direction: column; box-sizing: border-box; padding: 0 5vw; }

  /* Top bar: brand left, Up Next right */
  #bar { display: flex; align-items: center; justify-content: space-between; gap: 3vw; padding: 3vh 0 1vh; }
  #brand { display: flex; align-items: center; gap: 16px; font: 800 4.7vh system-ui; color: #7fe08a; }
  #brand img { width: 6vh; height: 6vh; }
  #upnext { display: none; align-items: center; gap: 18px; max-width: 46vw; }
  #upnext .un-txt { text-align: right; min-width: 0; }
  #upnext .un-lbl { color: #7fe08a; font: 800 2.1vh system-ui; letter-spacing: .16em; text-transform: uppercase; }
  #upnext #ntitle { font: 600 3vh system-ui; color: #cfe; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #upnext #nsub { display: flex; align-items: center; justify-content: flex-end; gap: 1vh; margin-top: .7vh;
    font: 600 2.2vh system-ui; color: #9fb0c4; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #upnext .unpill { flex: 0 0 auto; font: 700 1.9vh system-ui; color: #0b120d; background: #7fe08a;
    padding: .3vh 1.5vh; border-radius: 999px; letter-spacing: .03em; }
  #upnext img { width: 7.6vh; height: 7.6vh; border-radius: 8px; object-fit: cover; background: #0b0d11; flex: 0 0 auto; }

  #main { flex: 1 1 auto; display: flex; align-items: center; gap: 5vw; min-height: 0; }
  #cover { height: 62vh; aspect-ratio: 2/3; object-fit: cover; border-radius: 14px;
    background: #0b0d11; box-shadow: 0 14px 44px rgba(0,0,0,.6); flex: 0 0 auto; }
  #meta { min-width: 0; flex: 1 1 auto; }
  #eyebrow { font: 800 2.6vh system-ui; letter-spacing: .2em; text-transform: uppercase; color: #7fe08a; margin-bottom: 2.6vh; }
  #title { font: 800 6.8vh system-ui; line-height: 1.06; margin-bottom: 2vh;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  #author { font: 600 4.2vh system-ui; color: #cfe; margin-bottom: 2.4vh; min-height: 4.2vh; }
  #chapter { display: inline-block; font: 700 3vh system-ui; color: #0b120d; background: #7fe08a;
    padding: .6vh 2vh; border-radius: 999px; letter-spacing: .04em; white-space: nowrap; flex: 0 0 auto; }
  #chaptitle { font: 600 3.4vh system-ui; color: #cfe; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  #upnext .unchap { color: #cfe; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

  #prog { height: 10px; background: #26332c; border-radius: 5px; overflow: hidden; margin: 1.8vh 0 .9vh; }
  #fill { height: 100%; width: 0; background: linear-gradient(90deg, #2c8f59, #5fe0a0); }
  #times { display: flex; justify-content: space-between; font: 600 2.5vh system-ui; color: #9fb0c4; }

  #ctrls { display: flex; align-items: center; justify-content: center; gap: 3vw; padding: 2.4vh 0 3.4vh; }
  #ctrls button { border: 0; cursor: pointer; color: #e6e6e6; background: #1c2330; border: 1px solid #2a3a4a;
    border-radius: 50%; width: 9vh; height: 9vh; display: flex; align-items: center; justify-content: center; }
  #ctrls button svg { width: 4.4vh; height: 4.4vh; fill: currentColor; }
  #ctrls .seek { font: 800 2.4vh system-ui; color: #cde; }
  #ctrls #pp { width: 11vh; height: 11vh; background: #2c8f59; border-color: #5fe0a0; color: #06120b; }
  #ctrls #pp svg { width: 5.4vh; height: 5.4vh; }

  #ver { position: fixed; right: 1.4vw; bottom: 1vh; z-index: 2147483001; font: 600 1.3vh system-ui; color: #5aa987; opacity: .55; }
</style>
</head>
<body>
  <cast-media-player></cast-media-player>
  <div id="card">
    <div id="bar">
      <div id="brand"><img src="icon.svg" alt=""><span>HydraBear</span></div>
      <div id="upnext"><div class="un-txt"><div class="un-lbl">Up Next</div><div id="ntitle"></div><div id="nsub"></div></div><img id="nimg" alt=""></div>
    </div>
    <div id="main">
      <img id="cover" alt="">
      <div id="meta">
        <div id="eyebrow">Now Playing</div>
        <div id="title">Ready</div>
        <div id="author"></div>
        <div id="chaprow" style="display:none;align-items:center;gap:1.6vh;"><span id="chapter"></span><span id="chaptitle"></span></div>
      </div>
    </div>
    <div id="prog"><div id="fill"></div></div>
    <div id="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    <div id="ctrls">
      <button id="prev" title="Previous"><svg viewBox="0 0 24 24"><path d="M7 6h2.2v12H7zM20 6v12L9.5 12z"/></svg></button>
      <button id="back" class="seek" title="Back 30s">&minus;30</button>
      <button id="pp" title="Play/Pause"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button id="fwd" class="seek" title="Forward 30s">+30</button>
      <button id="next" title="Next"><svg viewBox="0 0 24 24"><path d="M14.8 6H17v12h-2.2zM4 6l10.5 6L4 18z"/></svg></button>
    </div>
  </div>
  <div id="ver">v10-dev</div>
  <script>
    const NAME = "HydraBear";
    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();
    const Cmd = cast.framework.messages.Command;
    const $ = (id) => document.getElementById(id);
    const escHtml = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const chapLbl = (t) => { t = (t || "").trim(); return (!t || /^part\s*0*\d+$/i.test(t)) ? "" : t; }; // real chapter title, or '' for a generic "Part N"
    const ICON_PLAY = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    const ICON_PAUSE = '<svg viewBox="0 0 24 24"><path d="M6.5 5h4v14h-4zM13.5 5h4v14h-4z"/></svg>';

    pm.setSupportedMediaCommands(
      Cmd.ALL_BASIC_MEDIA | Cmd.QUEUE_NEXT | Cmd.QUEUE_PREV | Cmd.SEEK, true);

    let resumeTo = 0;
    pm.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (req) => {
      const cd = (req.media && req.media.customData) || {};
      resumeTo = Number(cd.startPosition || req.currentTime || 0) || 0;
      req.currentTime = 0;
      return req;
    });
    pm.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
      if (resumeTo > 1) { try { pm.seek(resumeTo); } catch (e) {} resumeTo = 0; }
    });

    const fmt = (s) => {
      s = Math.max(0, Math.floor(s || 0));
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), x = s % 60;
      return (h ? h + ":" + String(m).padStart(2, "0") : m) + ":" + String(x).padStart(2, "0");
    };
    const mdOf = (item) => (item && item.media && item.media.metadata) || {};
    const imgOf = (md) => (md.images && md.images[0] && md.images[0].url) || "";

    function refreshMeta() {
      try {
        const qm = pm.getQueueManager && pm.getQueueManager();
        if (!qm) return;
        const items = qm.getItems() || [];
        const idx = qm.getCurrentItemIndex();
        const cur = mdOf(items[idx]);
        $("title").textContent = cur.albumName || cur.title || "Playing";
        const au = cur.artist || cur.albumArtist || "";
        $("author").textContent = au;
        const cimg = imgOf(cur); if (cimg) $("cover").src = cimg;
        if (idx >= 0 && items.length > 0) {
          $("chaprow").style.display = "flex";
          $("chapter").textContent = "Part " + (idx + 1) + " of " + items.length;
          const _ct = chapLbl(cur.title);
          $("chaptitle").textContent = _ct; $("chaptitle").style.display = _ct ? "" : "none";
        } else { $("chaprow").style.display = "none"; }
        const nx = items[idx + 1];
        if (nx) { const nmd = mdOf(nx);
          $("ntitle").textContent = nmd.albumName || nmd.title || "Next part";     // BOOK title (albumName), like the web card
          const nau = nmd.artist || nmd.albumArtist || "";
          const _nct = chapLbl(nmd.title);
          $("nsub").innerHTML = (nau ? escHtml(nau) : "") + '<span class="unpill">Part ' + (idx + 2) + ' of ' + items.length + '</span>' + (_nct ? ' <span class="unchap">' + escHtml(_nct) + '</span>' : '');
          $("nimg").src = imgOf(nmd) || "icon.svg"; $("upnext").style.display = "flex"; }
        else { $("upnext").style.display = "none"; }
      } catch (e) {}
    }

    try {
      const pd = new cast.framework.ui.PlayerData();
      const binder = new cast.framework.ui.PlayerDataBinder(pd);
      binder.addEventListener(cast.framework.ui.PlayerDataEventType.ANY_CHANGE, () => {
        try {
          const c = pd.currentTime || 0, d = pd.duration || 0;
          $("cur").textContent = fmt(c); $("dur").textContent = fmt(d);
          $("fill").style.width = d > 0 ? Math.min(100, (c / d) * 100) + "%" : "0";
          const paused = pd.state === cast.framework.ui.State.PAUSED;
          $("pp").innerHTML = paused ? ICON_PLAY : ICON_PAUSE;
          $("eyebrow").textContent = paused ? "Paused" : "Now Playing";
          refreshMeta();
        } catch (e) {}
      });
    } catch (e) {}
    pm.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, refreshMeta);

    const curTime = () => { try { return pm.getCurrentTimeSec(); } catch (e) { return 0; } };
    $("pp").onclick = () => { try { (pm.getPlayerState() === cast.framework.messages.PlayerState.PAUSED) ? pm.play() : pm.pause(); } catch (e) {} };
    $("back").onclick = () => { try { pm.seek(Math.max(0, curTime() - 30)); } catch (e) {} };
    $("fwd").onclick = () => { try { pm.seek(curTime() + 30); } catch (e) {} };
    const jump = (n) => {
      try {
        const qm = pm.getQueueManager();
        const items = qm.getItems() || [];
        const target = items[qm.getCurrentItemIndex() + n];
        if (!target) return;
        const req = new cast.framework.messages.QueueUpdateRequestData();
        req.currentItemId = target.itemId;
        (pm.sendLocalMediaRequest || pm.load).call(pm, req);
      } catch (e) {}
    };
    $("prev").onclick = () => jump(-1);
    $("next").onclick = () => jump(1);

    ctx.start(new cast.framework.CastReceiverOptions());
  </script>
</body>
</html>
